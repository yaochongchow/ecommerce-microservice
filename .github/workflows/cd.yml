name: CD

on:
  push:
    branches: [main]

permissions:
  id-token: write # required for OIDC token request
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: CDK deploy
        run: npx cdk deploy SharedStack OrderPaymentStack ProductCartStack PlatformStack InventoryStack ShippingStack NotificationStack --require-approval never
