name: CD

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: cd-main-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Node dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: CDK deploy
        run: npx cdk deploy SharedStack OrderPaymentStack ProductCartStack PlatformStack InventoryStack ShippingStack NotificationStack --require-approval never
